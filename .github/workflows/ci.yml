name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: thumbv7em-none-eabihf, x86_64-unknown-linux-gnu
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Firmware release build
        run: cargo build --release --no-default-features --features firmware --bin sigma-racer-sidearm

      - name: Host tests (contract + wire codec)
        run: cargo test-host

      - name: Clippy
        run: cargo clippy --target x86_64-unknown-linux-gnu --all-targets -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
